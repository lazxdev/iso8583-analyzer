<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="100" height="100" rx="20" fill="#0b0f19" />
  
  <!-- Outer glowing path -->
  <rect x="15" y="15" width="70" height="70" rx="15" fill="none" stroke="url(#grad)" stroke-width="6" />
  
  <!-- Inner Microchip Symbol -->
  <rect x="32" y="32" width="36" height="36" rx="6" fill="url(#grad)" />
  
  <!-- Chip Pins -->
  <rect x="45" y="8" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="25" y="8" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="65" y="8" width="10" height="10" rx="2" fill="url(#grad)" />
  
  <rect x="45" y="82" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="25" y="82" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="65" y="82" width="10" height="10" rx="2" fill="url(#grad)" />

  <rect x="8" y="45" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="8" y="25" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="8" y="65" width="10" height="10" rx="2" fill="url(#grad)" />

  <rect x="82" y="45" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="82" y="25" width="10" height="10" rx="2" fill="url(#grad)" />
  <rect x="82" y="65" width="10" height="10" rx="2" fill="url(#grad)" />
</svg>
